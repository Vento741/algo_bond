server {
    listen 80;
    server_name algo.dev-james.bond;
    location / { return 301 https://$server_name$request_uri; }
}

server {
    listen 443 ssl;
    server_name algo.dev-james.bond;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    location /api/ { proxy_pass http://api:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /ws/ { proxy_pass http://api:8000; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 86400; }
    location /health { proxy_pass http://api:8000; }
    location /flower/ { proxy_pass http://flower:5555; proxy_set_header Host $host; }
    location / { proxy_pass http://frontend:80; proxy_set_header Host $host; }
}
